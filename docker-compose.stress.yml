services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  consul:
    image: hashicorp/consul:latest
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 2s
      timeout: 3s
      retries: 10

  stress:
    build:
      context: .
      dockerfile: Dockerfile.test
    entrypoint: ["./run-stress-tests.sh"]
    environment:
      TEST_REDIS_ADDR: "redis:6379"
      TEST_REDIS_PASSWORD: ""
      TEST_CONSUL_ADDR: "http://consul:8500"
      STRESS_WORKERS: "${STRESS_WORKERS:-200}"
      STRESS_DURATION: "${STRESS_DURATION:-20s}"
      STRESS_SAMPLE_INTERVAL: "${STRESS_SAMPLE_INTERVAL:-250ms}"
      STRESS_SERVICE_KEYS: "${STRESS_SERVICE_KEYS:-2000}"
      STRESS_JOB_KEYS: "${STRESS_JOB_KEYS:-1000}"
      STRESS_JOB_SPEC_SIZE: "${STRESS_JOB_SPEC_SIZE:-32768}"
      STRESS_GO_TEST_TIMEOUT: "${STRESS_GO_TEST_TIMEOUT:-20m}"
    depends_on:
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy