http:
  routers:
    s2z-fallback:
      rule: "HostRegexp(`^[a-z0-9-]+\\.localhost$`)"
      priority: 1
      entryPoints:
        - http
      service: s2z-activator

  services:
    s2z-activator:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://activator:8090"
