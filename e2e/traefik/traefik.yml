api:
  insecure: true
  dashboard: true

ping:
  entryPoint: http

log:
  level: DEBUG
  format: json

accessLog:
  format: json
  filters:
    statusCodes:
      - "400-599"

entryPoints:
  http:
    address: ":80"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
  consulCatalog:
    endpoint:
      address: consul:8500
      scheme: http
      token: ${CONSUL_CATALOG_TOKEN}
    exposedByDefault: false
    watch: true
    refreshInterval: 5s

experimental:
  localPlugins:
    scalewaker:
      moduleName: nomad_scale_to_zero/traefik-plugin
