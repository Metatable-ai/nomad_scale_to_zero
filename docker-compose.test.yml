services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  consul:
    image: hashicorp/consul:latest
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 2s
      timeout: 3s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      TEST_REDIS_ADDR: "redis:6379"
      TEST_REDIS_PASSWORD: ""
      TEST_CONSUL_ADDR: "http://consul:8500"
    depends_on:
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
