services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  consul:
    image: hashicorp/consul:1.22.2
    command: agent -dev -client=0.0.0.0 -config-file=/consul/config/consul.hcl
    ports:
      - "8500:8500"
    volumes:
      - ./e2e/consul/consul.hcl:/consul/config/consul.hcl:ro
      - consul-data:/consul/data

  consul-acl-bootstrap:
    image: nomad-scale-to-zero-e2e:latest
    build:
      context: .
      dockerfile: Dockerfile.e2e
    entrypoint:
      - /app/e2e/scripts/bootstrap-consul-acls.sh
    environment:
      CONSUL_ADDR: http://consul:8500
      E2E_BOOTSTRAP_DIR: /bootstrap
    volumes:
      - bootstrap-state:/bootstrap
    depends_on:
      consul:
        condition: service_started

  nomad-server:
    image: nomad-scale-to-zero-e2e:latest
    build:
      context: .
      dockerfile: Dockerfile.e2e
    entrypoint:
      - /usr/local/bin/nomad
    command:
      - agent
      - -config=/bootstrap/server.hcl
    privileged: true
    environment:
      NOMAD_SKIP_DOCKER_IMAGE_WARN: "true"
    ports:
      - "4646:4646"
    volumes:
      - bootstrap-state:/bootstrap:ro
      - nomad-server-data:/tmp/nomad
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4646/v1/status/leader"]
      interval: 3s
      timeout: 3s
      retries: 20
    depends_on:
      consul-acl-bootstrap:
        condition: service_completed_successfully

  nomad-client:
    image: nomad-scale-to-zero-e2e:latest
    build:
      context: .
      dockerfile: Dockerfile.e2e
    entrypoint:
      - /usr/local/bin/nomad
    command:
      - agent
      - -config=/bootstrap/client.hcl
    user: "65534:65534"
    environment:
      NOMAD_SKIP_DOCKER_IMAGE_WARN: "true"
    deploy:
      replicas: ${E2E_NOMAD_CLIENTS:-3}
    volumes:
      - bootstrap-state:/bootstrap:ro
    depends_on:
      nomad-server:
        condition: service_healthy

  nomad-acl-bootstrap:
    image: nomad-scale-to-zero-e2e:latest
    build:
      context: .
      dockerfile: Dockerfile.e2e
    entrypoint:
      - /app/e2e/scripts/bootstrap-nomad-acls.sh
    environment:
      NOMAD_ADDR: http://nomad-server:4646
      E2E_BOOTSTRAP_DIR: /bootstrap
    volumes:
      - bootstrap-state:/bootstrap
    depends_on:
      nomad-server:
        condition: service_healthy

  traefik:
    image: traefik:v3.1
    command:
      - --configfile=/bootstrap/traefik.yml
      - --providers.file.watch=true
    environment:
      S2Z_NOMAD_ADDR: http://nomad-server:4646
      S2Z_CONSUL_ADDR: http://consul:8500
      S2Z_ACTIVITY_STORE: redis
      S2Z_JOB_SPEC_STORE: redis
      S2Z_REDIS_ADDR: redis:6379
      S2Z_REDIS_PASSWORD: ""
      S2Z_BOOTSTRAP_DIR: /bootstrap
      S2Z_LOG_LEVEL: debug
    ports:
      - "8080:8080"
      - "8088:80"
    volumes:
      - ./traefik-plugin:/plugins-local/src/nomad_scale_to_zero/traefik-plugin:ro
      - ./e2e/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - bootstrap-state:/bootstrap:ro
    depends_on:
      nomad-acl-bootstrap:
        condition: service_completed_successfully

  idle-scaler:
    image: nomad-scale-to-zero-e2e:latest
    build:
      context: .
      dockerfile: Dockerfile.e2e
    entrypoint:
      - /app/e2e/scripts/start-idle-scaler.sh
    environment:
      NOMAD_ADDR: http://nomad-server:4646
      CONSUL_ADDR: http://consul:8500
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      STORE_TYPE: "${E2E_STORE_TYPE:-redis}"
      IDLE_CHECK_INTERVAL: "${E2E_IDLE_CHECK_INTERVAL:-3s}"
      DEFAULT_IDLE_TIMEOUT: "${E2E_IDLE_TIMEOUT:-10s}"
      PURGE_ON_SCALEDOWN: "false"
      METRICS_ADDR: ":9108"
      LOG_LEVEL: info
      E2E_BOOTSTRAP_DIR: /bootstrap
    expose:
      - "9108"
    volumes:
      - bootstrap-state:/bootstrap:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9108/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      redis:
        condition: service_healthy
      nomad-acl-bootstrap:
        condition: service_completed_successfully

  e2e-runner:
    image: nomad-scale-to-zero-e2e:latest
    build:
      context: .
      dockerfile: Dockerfile.e2e
    entrypoint:
      - /app/e2e/scripts/start-e2e-runner.sh
    environment:
      E2E_JOB_COUNT: "${E2E_JOB_COUNT:-10}"
      E2E_IDLE_TIMEOUT: "${E2E_IDLE_TIMEOUT:-10s}"
      E2E_IDLE_CHECK_INTERVAL: "${E2E_IDLE_CHECK_INTERVAL:-3s}"
      E2E_TRAEFIK_BASE_URL: "${E2E_TRAEFIK_BASE_URL:-http://traefik:80}"
      E2E_TRAEFIK_PUBLIC_URL: "${E2E_TRAEFIK_PUBLIC_URL:-http://traefik:80}"
      E2E_REQUEST_TIMEOUT: "${E2E_REQUEST_TIMEOUT:-45s}"
      E2E_SOAK_CYCLES: "${E2E_SOAK_CYCLES:-3}"
      E2E_STARTUP_READY_TIMEOUT: "${E2E_STARTUP_READY_TIMEOUT:-}"
      E2E_CONSUL_SERVICES_TIMEOUT: "${E2E_CONSUL_SERVICES_TIMEOUT:-}"
      E2E_NOMAD_WAKE_TIMEOUT: "${E2E_NOMAD_WAKE_TIMEOUT:-}"
      E2E_CONSUL_CHECKS_TIMEOUT: "${E2E_CONSUL_CHECKS_TIMEOUT:-}"
      E2E_TRAFFIC_SCENARIO: "${E2E_TRAFFIC_SCENARIO:-storm}"
      E2E_JOB_CPU: "${E2E_JOB_CPU:-50}"
      E2E_JOB_MEMORY: "${E2E_JOB_MEMORY:-64}"
      E2E_JOB_CHECK_INTERVAL: "${E2E_JOB_CHECK_INTERVAL:-2s}"
      E2E_JOB_CHECK_TIMEOUT: "${E2E_JOB_CHECK_TIMEOUT:-2s}"
      E2E_WARMUP_VUS: "${E2E_WARMUP_VUS:-5}"
      E2E_WARMUP_DURATION: "${E2E_WARMUP_DURATION:-10s}"
      E2E_BURST_VUS: "${E2E_BURST_VUS:-50}"
      E2E_BURST_DURATION: "${E2E_BURST_DURATION:-20s}"
      E2E_STORM_VUS: "${E2E_STORM_VUS:-100}"
      E2E_STORM_DURATION: "${E2E_STORM_DURATION:-30s}"
      E2E_STORM_RATE: "${E2E_STORM_RATE:-250}"
      E2E_STORM_PREALLOCATED_VUS: "${E2E_STORM_PREALLOCATED_VUS:-150}"
      E2E_NOMAD_ADDR: http://nomad-server:4646
      E2E_CONSUL_ADDR: http://consul:8500
      E2E_REDIS_ADDR: redis:6379
      E2E_REDIS_PASSWORD: ""
      E2E_STORE_TYPE: redis
      E2E_BOOTSTRAP_DIR: /bootstrap
    volumes:
      - bootstrap-state:/bootstrap:ro
    depends_on:
      redis:
        condition: service_healthy
      traefik:
        condition: service_started
      idle-scaler:
        condition: service_healthy
      nomad-acl-bootstrap:
        condition: service_completed_successfully

volumes:
  bootstrap-state:
  consul-data:
  nomad-server-data: