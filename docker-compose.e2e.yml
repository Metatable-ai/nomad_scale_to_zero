x-e2e-service: &e2e-service
  build:
    context: .
    dockerfile: Dockerfile.e2e

x-consul-server-base: &consul-server-base
  <<: *e2e-service
  entrypoint:
    - /app/e2e/scripts/start-consul-server.sh
  environment: &consul-server-env
    E2E_TARGET_CONSUL_SERVERS: "${E2E_TARGET_CONSUL_SERVERS:-1}"
  tmpfs:
    - /consul/data

x-nomad-server-base: &nomad-server-base
  <<: *e2e-service
  entrypoint:
    - /app/e2e/scripts/start-nomad-server.sh
  privileged: true
  environment: &nomad-server-env
    NOMAD_SKIP_DOCKER_IMAGE_WARN: "true"
    E2E_TARGET_NOMAD_SERVERS: "${E2E_TARGET_NOMAD_SERVERS:-1}"
    E2E_BOOTSTRAP_DIR: /bootstrap
  volumes:
    - bootstrap-state:/bootstrap:ro
  tmpfs:
    - /tmp/nomad
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4646/v1/status/leader"]
    interval: 3s
    timeout: 3s
    retries: 20
  depends_on:
    consul-acl-bootstrap:
      condition: service_completed_successfully

x-nomad-client-base: &nomad-client-base
  <<: *e2e-service
  entrypoint:
    - /app/e2e/scripts/start-nomad-client.sh
  privileged: true
  cgroup: host
  environment: &nomad-client-env
    NOMAD_SKIP_DOCKER_IMAGE_WARN: "true"
    E2E_TARGET_NOMAD_SERVERS: "${E2E_TARGET_NOMAD_SERVERS:-1}"
    E2E_BOOTSTRAP_DIR: /bootstrap
  volumes:
    - bootstrap-state:/bootstrap:ro
    - /sys/fs/cgroup:/sys/fs/cgroup:rw
  tmpfs:
    - /tmp/nomad
  depends_on:
    nomad-acl-bootstrap:
      condition: service_completed_successfully

x-traefik-base: &traefik-base
  image: traefik:v3.1
  command:
    - --configfile=/bootstrap/traefik.yml
    - --providers.file.watch=true
  environment: &traefik-env
    S2Z_NOMAD_ADDR: http://nomad-server:4646
    S2Z_CONSUL_ADDR: http://consul:8500
    S2Z_ACTIVITY_STORE: redis
    S2Z_JOB_SPEC_STORE: redis
    S2Z_REDIS_ADDR: redis:6379
    S2Z_REDIS_PASSWORD: ""
    S2Z_BOOTSTRAP_DIR: /bootstrap
    S2Z_LOG_LEVEL: debug
  volumes:
    - ./traefik-plugin:/plugins-local/src/nomad_scale_to_zero/traefik-plugin:ro
    - ./e2e/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    - bootstrap-state:/bootstrap:ro
  depends_on:
    nomad-acl-bootstrap:
      condition: service_completed_successfully

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  consul:
    <<: *consul-server-base
    environment:
      <<: *consul-server-env
      CONSUL_NODE_NAME: consul
    ports:
      - "8500:8500"

  consul-server-2:
    <<: *consul-server-base
    environment:
      <<: *consul-server-env
      CONSUL_NODE_NAME: consul-server-2

  consul-server-3:
    <<: *consul-server-base
    environment:
      <<: *consul-server-env
      CONSUL_NODE_NAME: consul-server-3

  consul-acl-bootstrap:
    <<: *e2e-service
    entrypoint:
      - /app/e2e/scripts/bootstrap-consul-acls.sh
    environment:
      CONSUL_ADDR: http://consul:8500
      E2E_BOOTSTRAP_DIR: /bootstrap
      E2E_TARGET_CONSUL_SERVERS: "${E2E_TARGET_CONSUL_SERVERS:-1}"
    volumes:
      - bootstrap-state:/bootstrap
    depends_on:
      consul:
        condition: service_started

  nomad-server:
    <<: *nomad-server-base
    environment:
      <<: *nomad-server-env
      NOMAD_NODE_NAME: nomad-server
    ports:
      - "4646:4646"

  nomad-server-2:
    <<: *nomad-server-base
    environment:
      <<: *nomad-server-env
      NOMAD_NODE_NAME: nomad-server-2

  nomad-server-3:
    <<: *nomad-server-base
    environment:
      <<: *nomad-server-env
      NOMAD_NODE_NAME: nomad-server-3

  nomad-client:
    <<: *nomad-client-base
    environment:
      <<: *nomad-client-env
      NOMAD_NODE_NAME: nomad-client

  nomad-client-2:
    <<: *nomad-client-base
    environment:
      <<: *nomad-client-env
      NOMAD_NODE_NAME: nomad-client-2

  nomad-client-3:
    <<: *nomad-client-base
    environment:
      <<: *nomad-client-env
      NOMAD_NODE_NAME: nomad-client-3

  nomad-acl-bootstrap:
    <<: *e2e-service
    entrypoint:
      - /app/e2e/scripts/bootstrap-nomad-acls.sh
    environment:
      NOMAD_ADDR: http://nomad-server:4646
      E2E_BOOTSTRAP_DIR: /bootstrap
      E2E_TARGET_NOMAD_SERVERS: "${E2E_TARGET_NOMAD_SERVERS:-1}"
    volumes:
      - bootstrap-state:/bootstrap
    depends_on:
      nomad-server:
        condition: service_healthy

  traefik:
    <<: *traefik-base
    ports:
      - "8080:8080"
      - "8088:80"

  traefik-2:
    <<: *traefik-base

  idle-scaler:
    <<: *e2e-service
    entrypoint:
      - /app/e2e/scripts/start-idle-scaler.sh
    environment:
      NOMAD_ADDR: http://nomad-server:4646
      CONSUL_ADDR: http://consul:8500
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      STORE_TYPE: "${E2E_STORE_TYPE:-redis}"
      IDLE_CHECK_INTERVAL: "${E2E_IDLE_CHECK_INTERVAL:-3s}"
      DEFAULT_IDLE_TIMEOUT: "${E2E_IDLE_TIMEOUT:-10s}"
      MIN_SCALE_DOWN_AGE: "${E2E_MIN_SCALE_DOWN_AGE:-1m}"
      PURGE_ON_SCALEDOWN: "false"
      METRICS_ADDR: ":9108"
      LOG_LEVEL: info
      E2E_BOOTSTRAP_DIR: /bootstrap
    expose:
      - "9108"
    volumes:
      - bootstrap-state:/bootstrap:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9108/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      redis:
        condition: service_healthy
      nomad-acl-bootstrap:
        condition: service_completed_successfully

  activator:
    <<: *e2e-service
    entrypoint:
      - /app/e2e/scripts/start-activator.sh
    environment:
      NOMAD_ADDR: http://nomad-server:4646
      CONSUL_ADDR: http://consul:8500
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ACTIVATOR_ADDR: ":8090"
      ACTIVATOR_REQUEST_TIMEOUT: "${E2E_REQUEST_TIMEOUT:-45s}"
      ACTIVATOR_ACTIVATION_TIMEOUT: "${E2E_ACTIVATOR_ACTIVATION_TIMEOUT:-}"
      LOG_LEVEL: info
      E2E_BOOTSTRAP_DIR: /bootstrap
    expose:
      - "8090"
    volumes:
      - bootstrap-state:/bootstrap:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      redis:
        condition: service_healthy
      nomad-acl-bootstrap:
        condition: service_completed_successfully

  activator-2:
    <<: *e2e-service
    entrypoint:
      - /app/e2e/scripts/start-activator.sh
    environment:
      NOMAD_ADDR: http://nomad-server:4646
      CONSUL_ADDR: http://consul:8500
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ACTIVATOR_ADDR: ":8090"
      ACTIVATOR_REQUEST_TIMEOUT: "${E2E_REQUEST_TIMEOUT:-45s}"
      ACTIVATOR_ACTIVATION_TIMEOUT: "${E2E_ACTIVATOR_ACTIVATION_TIMEOUT:-}"
      LOG_LEVEL: info
      E2E_BOOTSTRAP_DIR: /bootstrap
    expose:
      - "8090"
    volumes:
      - bootstrap-state:/bootstrap:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      redis:
        condition: service_healthy
      nomad-acl-bootstrap:
        condition: service_completed_successfully

  e2e-runner:
    <<: *e2e-service
    entrypoint:
      - /app/e2e/scripts/start-e2e-runner.sh
    environment:
      E2E_RUN_ID: "${E2E_RUN_ID:-}"
      E2E_PROFILE: "${E2E_PROFILE:-certification}"
      E2E_PROFILE_DESCRIPTION: "${E2E_PROFILE_DESCRIPTION:-}"
      E2E_AUTOMATION_JOB_NAME: "${E2E_AUTOMATION_JOB_NAME:-}"
      E2E_AUTOMATION_SMOKE_JOB: "${E2E_AUTOMATION_SMOKE_JOB:-}"
      E2E_AUTOMATION_CERTIFICATION_JOB: "${E2E_AUTOMATION_CERTIFICATION_JOB:-}"
      E2E_TARGET_NOMAD_SERVERS: "${E2E_TARGET_NOMAD_SERVERS:-}"
      E2E_TARGET_NOMAD_CLIENTS: "${E2E_TARGET_NOMAD_CLIENTS:-}"
      E2E_TARGET_CONSUL_SERVERS: "${E2E_TARGET_CONSUL_SERVERS:-}"
      E2E_TARGET_TRAEFIK_REPLICAS: "${E2E_TARGET_TRAEFIK_REPLICAS:-}"
      E2E_TARGET_REDIS_NODES: "${E2E_TARGET_REDIS_NODES:-}"
      E2E_TARGET_IDLE_SCALER_PLACEMENT: "${E2E_TARGET_IDLE_SCALER_PLACEMENT:-}"
      E2E_TARGET_IDLE_SCALER_ISOLATION_MODE: "${E2E_TARGET_IDLE_SCALER_ISOLATION_MODE:-}"
      E2E_ENABLE_ACTIVATOR_SERVICE: "${E2E_ENABLE_ACTIVATOR_SERVICE:-true}"
      E2E_ACTIVATOR_BASE_URL: "${E2E_ACTIVATOR_BASE_URL:-http://activator:8090}"
      E2E_WORKLOAD_MIX_LABELS: "${E2E_WORKLOAD_MIX_LABELS:-}"
      E2E_WORKLOAD_FAST_API_COUNT: "${E2E_WORKLOAD_FAST_API_COUNT:-}"
      E2E_WORKLOAD_SLOW_START_COUNT: "${E2E_WORKLOAD_SLOW_START_COUNT:-}"
      E2E_WORKLOAD_DEPENDENCY_SENSITIVE_COUNT: "${E2E_WORKLOAD_DEPENDENCY_SENSITIVE_COUNT:-}"
      E2E_TRAFFIC_SHAPE: "${E2E_TRAFFIC_SHAPE:-}"
      E2E_JOB_COUNT: "${E2E_JOB_COUNT:-10}"
      E2E_IDLE_TIMEOUT: "${E2E_IDLE_TIMEOUT:-10s}"
      E2E_IDLE_CHECK_INTERVAL: "${E2E_IDLE_CHECK_INTERVAL:-3s}"
      E2E_TRAEFIK_BASE_URL: "${E2E_TRAEFIK_BASE_URL:-http://traefik:80}"
      E2E_TRAEFIK_PUBLIC_URL: "${E2E_TRAEFIK_PUBLIC_URL:-http://traefik:80}"
      E2E_TRAEFIK_INTERNAL_URL: "${E2E_TRAEFIK_INTERNAL_URL:-}"
      E2E_REQUEST_TIMEOUT: "${E2E_REQUEST_TIMEOUT:-45s}"
      E2E_SOAK_CYCLES: "${E2E_SOAK_CYCLES:-3}"
      E2E_SCENARIO_SET: "${E2E_SCENARIO_SET:-}"
      E2E_STARTUP_READY_TIMEOUT: "${E2E_STARTUP_READY_TIMEOUT:-}"
      E2E_CONSUL_SERVICES_TIMEOUT: "${E2E_CONSUL_SERVICES_TIMEOUT:-}"
      E2E_NOMAD_WAKE_TIMEOUT: "${E2E_NOMAD_WAKE_TIMEOUT:-}"
      E2E_CONSUL_CHECKS_TIMEOUT: "${E2E_CONSUL_CHECKS_TIMEOUT:-}"
      E2E_TRAFFIC_SCENARIO: "${E2E_TRAFFIC_SCENARIO:-storm}"
      E2E_K6_TARGET_MODE: "${E2E_K6_TARGET_MODE:-}"
      E2E_JOB_CPU: "${E2E_JOB_CPU:-50}"
      E2E_JOB_MEMORY: "${E2E_JOB_MEMORY:-64}"
      E2E_JOB_CHECK_INTERVAL: "${E2E_JOB_CHECK_INTERVAL:-2s}"
      E2E_JOB_CHECK_TIMEOUT: "${E2E_JOB_CHECK_TIMEOUT:-2s}"
      E2E_WARMUP_VUS: "${E2E_WARMUP_VUS:-5}"
      E2E_WARMUP_DURATION: "${E2E_WARMUP_DURATION:-10s}"
      E2E_BURST_VUS: "${E2E_BURST_VUS:-50}"
      E2E_BURST_DURATION: "${E2E_BURST_DURATION:-20s}"
      E2E_STORM_VUS: "${E2E_STORM_VUS:-100}"
      E2E_STORM_START_RATE: "${E2E_STORM_START_RATE:-}"
      E2E_STORM_DURATION: "${E2E_STORM_DURATION:-30s}"
      E2E_STORM_RATE: "${E2E_STORM_RATE:-250}"
      E2E_STORM_PREALLOCATED_VUS: "${E2E_STORM_PREALLOCATED_VUS:-150}"
      E2E_STORM_MAX_VUS: "${E2E_STORM_MAX_VUS:-}"
      E2E_GATE_TRAFFIC_SUCCESS_RATE: "${E2E_GATE_TRAFFIC_SUCCESS_RATE:-}"
      E2E_GATE_WAKE_P95_MS: "${E2E_GATE_WAKE_P95_MS:-}"
      E2E_GATE_WAKE_P99_MS: "${E2E_GATE_WAKE_P99_MS:-}"
      E2E_GATE_SCALE_TO_ZERO_MAX_SECONDS: "${E2E_GATE_SCALE_TO_ZERO_MAX_SECONDS:-}"
      E2E_GATE_DEPENDENCY_READY_MAX_SECONDS: "${E2E_GATE_DEPENDENCY_READY_MAX_SECONDS:-}"
      E2E_NOMAD_ADDR: http://nomad-server:4646
      E2E_CONSUL_ADDR: http://consul:8500
      E2E_REDIS_ADDR: redis:6379
      E2E_REDIS_PASSWORD: ""
      E2E_STORE_TYPE: redis
      E2E_BOOTSTRAP_DIR: /bootstrap
      E2E_ARTIFACTS_DIR: /artifacts
    volumes:
      - bootstrap-state:/bootstrap:ro
      - ${E2E_ARTIFACTS_DIR:-./.e2e-artifacts/manual}:/artifacts
    depends_on:
      redis:
        condition: service_healthy
      traefik:
        condition: service_started
      nomad-client:
        condition: service_started
      nomad-acl-bootstrap:
        condition: service_completed_successfully

volumes:
  bootstrap-state:
